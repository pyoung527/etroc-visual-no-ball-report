apiVersion: apps/v1
kind: Deployment
metadata:
  name: etl-hybrid-bbqc
  labels:
    app: etl-hybrid-bbqc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: etl-hybrid-bbqc
  template:
    metadata:
      labels:
        app: etl-hybrid-bbqc
    spec:
      containers:
        - name: web
          image: image-registry.openshift-image-registry.svc:5000/etroc-solder-inspection/etl-hybrid-bbqc:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: STATIC_ROOT
              value: /app/static
            - name: COMMENTS_DB
              value: /data/comments.sqlite3
            - name: COMMENTS_ALLOW_ANON
              value: "false"
          volumeMounts:
            - name: comments-data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 30m
              memory: 96Mi
            limits:
              cpu: 300m
              memory: 384Mi
      volumes:
        - name: comments-data
          persistentVolumeClaim:
            claimName: etl-hybrid-bbqc-comments
